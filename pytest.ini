[pytest]
# Asyncio mode
asyncio_mode = auto

# Test paths
testpaths = tests

# Python files
python_files = test_*.py

# Minimum version
minversion = 8.0

# Add options for markers
addopts = -v --strict-markers --tb=short --disable-warnings

# Custom markers
markers =
    asyncio: mark test as async
    integration: mark test as integration test
    slow: mark test as slow running
    collectors: mark test as collector test
    pipeline: mark test as pipeline test
    error_handling: mark test as error handling test
