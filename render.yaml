# Render Blueprint Configuration
# Save as render.yaml in project root

services:
  - name: news-agent
    type: web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --mode scheduler --scheduled
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: LOG_LEVEL
        value: INFO
      - key: NEWSLETTER_HOUR
        value: "9"
      - key: NEWSLETTER_MINUTE
        value: "0"
      - key: USE_POSTGRES_CHECKPOINT
        value: "false"
      - key: ENABLE_GOOGLE_DRIVE
        value: "true"
      - key: GOOGLE_DRIVE_FOLDER_ID
        value: "1Tiez1n0EGUULZecnDP92dyKeiblSCP4q"