name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: ~/.pip

jobs:
  # Test on multiple Python versions
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock httpx
      
      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing --tb=short
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-python-${{ matrix.python-version }}
          fail_ci_if_error: false

  # Lint and code quality
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy isort
      
      - name: Check import order with isort
        run: isort --check-only --diff app/ tests/ || true
        continue-on-error: true
       
      - name: Check format with black
        run: black --check app/ tests/ || true
        continue-on-error: true
      
      - name: Lint with ruff
        run: ruff check app/ tests/ --fix --exit-zero
      
      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports --exit-zero || true
        continue-on-error: true

  # Validate configuration and security
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install praw httpx
      
      - name: Validate settings
        run: |
          python -c "
          from app.config.settings import get_settings
          s = get_settings()
          print('Settings loaded successfully')
          print(f'Groq API: {\"configured\" if s.groq_api_key else \"not configured\"}')"
      
      - name: Check for security issues
        run: |
          pip install bandit safety
          bandit -r app/ -ll --exit-zero || true
          safety check --exit-zero || true
      
      - name: Verify workflow compiles
        run: |
          python -c "
          from app.graph.builder import build_graph
          from app.graph.state import NewsItem, NewsState
          graph = build_graph()
          print(f'Workflow verified: {len(graph.nodes)} nodes')
          print(f'NewsItem fields: {list(NewsItem.model_fields.keys())}')
          "

  # Integration tests
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock httpx
      
      - name: Run integration tests
        run: pytest tests/test_integration.py -v --tb=short || true
        continue-on-error: true

  # Smoke tests
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      
      - name: Run smoke tests
        run: pytest tests/test_smoke.py -v --tb=short

  # Docker build check
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: ai-news-agent:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Notify on failure
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [test, lint, validate, smoke, docker]
    if: failure()
    
    steps:
      - name: Send failure notification
        run: |
          echo "❌ CI Pipeline failed"
          echo "Failed jobs: ${{ join(needs.*.result, ', ') }}"